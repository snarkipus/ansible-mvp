schema_version: "0.1"
run:
  default_run_id: demo_001
  description: Local synthetic provenance-first MVP run.
repositories:
  wrapper:
    name: ansible-mvp
    path: .
    require_git_worktree: true
    clean_policy: configured_paths_only
    controlled_paths:
      - Makefile
      - ansible/inventory/localhost.ini
      - ansible/inventory/group_vars/all.yml
      - ansible/playbooks/run_synthetic_workflow.yml
      - configs/run.synthetic.yaml
      - configs/expected_shape.required_extract.yaml
      - scripts/bootstrap_controlled_source.sh
      - src/provenance/cli.py
      - src/provenance/git_state.py
      - src/provenance/hashing.py
      - src/provenance/inventory.py
      - src/provenance/manifest.py
      - src/provenance/preflight.py
      - src/provenance/validation.py
  controlled_source:
    name: controlled-source-demo
    path_variable: controlled_source_repo
    default_path: ../controlled-source-demo
    ref_variable: controlled_source_ref
    default_ref: controlled-source-demo-v0.1.0
    require_git_worktree: true
    require_clean_worktree: true
layout:
  run_root: runs/{run_id}
  sim_run_root: runs/{run_id}/sim-run-root
  provenance_root: runs/{run_id}/provenance
  simulation_areas:
    - input
    - lists
    - files
    - procs
  provenance_directories:
    - logs
    - inventories
    - scheduler
    - validations
    - products/extracted
    - products/reports
  canonical_raw_output: lists/dirC/sim-out.dat
hash_policy:
  algorithm: sha256
  hash_small_artifacts: true
  large_artifact_policy: deferred_for_production
controlled_scripts:
  run_script:
    repository: controlled_source
    relative_path: procs/run-script.sh
    materialized_path: sim-run-root/procs/run-script.sh
    executable: true
    materialization_mode: copy_from_controlled_source
  synthetic_sim_engine:
    repository: controlled_source
    relative_path: scripts/synthetic_sim_engine.sh
    executable: true
  extract_required:
    repository: controlled_source
    relative_path: scripts/extract_required.pl
    executable: true
  ad_hoc_extract:
    repository: controlled_source
    relative_path: scripts/ad_hoc_extract.py
    executable: true
approved_command_paths:
  controlled_source:
    - procs/run-script.sh
    - scripts/synthetic_sim_engine.sh
    - scripts/extract_required.pl
    - scripts/ad_hoc_extract.py
  wrapper:
    - Makefile
    - src/provenance/cli.py
materialization:
  inputs:
    source_root: fixtures/controlled_inputs
    destination_root: sim-run-root/input
    logical_groups:
      - dirA
      - dirB
      - dirC
    files:
      - ex1.dat
      - ex2.dat
      - ex3.dat
    mode: copy_from_controlled_source
  runtime_scripts:
    - run_script
scheduler:
  mode: mock_lsf
  metadata_path: provenance/scheduler/submission.yaml
  require_real_lsf: false
stage_defaults:
  shell: bash
  fail_on_error: true
  log_directory: provenance/logs
stages:
  - name: preflight
    command: make preflight
    working_directory: wrapper_repo
    command_kind: wrapper_make_target
    approved_command_path: Makefile
    expected_controlled_scripts:
      - run_script
      - synthetic_sim_engine
      - extract_required
      - ad_hoc_extract
    outputs:
      - provenance/preflight.json
  - name: prepare_workspace
    command: make prepare-workspace
    working_directory: wrapper_repo
    command_kind: wrapper_make_target
    approved_command_path: Makefile
    outputs:
      - sim-run-root/input
      - sim-run-root/lists
      - sim-run-root/files
      - sim-run-root/procs
      - provenance/logs
      - provenance/inventories
      - provenance/scheduler
      - provenance/validations
      - provenance/products/extracted
      - provenance/products/reports
  - name: materialize_inputs
    command: make materialize-inputs
    working_directory: wrapper_repo
    command_kind: wrapper_make_target
    approved_command_path: Makefile
    expected_inputs:
      - fixtures/controlled_inputs/dirA/ex1.dat
      - fixtures/controlled_inputs/dirA/ex2.dat
      - fixtures/controlled_inputs/dirA/ex3.dat
      - fixtures/controlled_inputs/dirB/ex1.dat
      - fixtures/controlled_inputs/dirB/ex2.dat
      - fixtures/controlled_inputs/dirB/ex3.dat
      - fixtures/controlled_inputs/dirC/ex1.dat
      - fixtures/controlled_inputs/dirC/ex2.dat
      - fixtures/controlled_inputs/dirC/ex3.dat
    outputs:
      - sim-run-root/input/dirA/ex1.dat
      - sim-run-root/input/dirA/ex2.dat
      - sim-run-root/input/dirA/ex3.dat
      - sim-run-root/input/dirB/ex1.dat
      - sim-run-root/input/dirB/ex2.dat
      - sim-run-root/input/dirB/ex3.dat
      - sim-run-root/input/dirC/ex1.dat
      - sim-run-root/input/dirC/ex2.dat
      - sim-run-root/input/dirC/ex3.dat
  - name: materialize_procs
    command: make materialize-procs
    working_directory: wrapper_repo
    command_kind: wrapper_make_target
    approved_command_path: Makefile
    expected_controlled_scripts:
      - run_script
    outputs:
      - sim-run-root/procs/run-script.sh
  - name: submit_mock_lsf
    command: make submit-mock-lsf
    working_directory: wrapper_repo
    command_kind: wrapper_make_target
    approved_command_path: Makefile
    outputs:
      - provenance/scheduler/submission.yaml
  - name: run_simulation
    command: sim-run-root/procs/run-script.sh
    working_directory: sim-run-root
    command_kind: materialized_controlled_script
    approved_command_path: procs/run-script.sh
    expected_controlled_scripts:
      - run_script
      - synthetic_sim_engine
    inputs:
      - sim-run-root/input
    outputs:
      - sim-run-root/lists/dirC/sim-out.dat
  - name: extract_required
    command: scripts/extract_required.pl sim-run-root/lists/dirC/sim-out.dat provenance/products/extracted/required.csv
    working_directory: controlled_source_repo
    command_kind: controlled_source_script
    approved_command_path: scripts/extract_required.pl
    expected_controlled_scripts:
      - extract_required
    inputs:
      - sim-run-root/lists/dirC/sim-out.dat
    outputs:
      - provenance/products/extracted/required.csv
  - name: extract_ad_hoc
    command: scripts/ad_hoc_extract.py sim-run-root/lists/dirC/sim-out.dat provenance/products/extracted/ad_hoc.csv
    working_directory: controlled_source_repo
    command_kind: controlled_source_script
    approved_command_path: scripts/ad_hoc_extract.py
    expected_controlled_scripts:
      - ad_hoc_extract
    inputs:
      - sim-run-root/lists/dirC/sim-out.dat
    outputs:
      - provenance/products/extracted/ad_hoc.csv
  - name: build_reports
    command: make build-reports
    working_directory: wrapper_repo
    command_kind: wrapper_make_target
    approved_command_path: Makefile
    inputs:
      - provenance/products/extracted/required.csv
      - provenance/products/extracted/ad_hoc.csv
    outputs:
      - provenance/products/reports/summary.xlsx
      - provenance/products/reports/chart.png
      - provenance/products/reports/briefing.pptx
validations:
  required_extract:
    config_path: configs/expected_shape.required_extract.yaml
    product_path: provenance/products/extracted/required.csv
    evidence_path: provenance/validations/required_extract.json
manifest:
  output_path: provenance/manifest.yaml
  required_top_level_sections:
    - manifest_version
    - run
    - repositories
    - simulation_layout
    - controlled_source_gate
    - scheduler
    - inputs
    - runtime_scripts
    - stages
    - raw_simulation_outputs
    - derived_products
    - validations
    - logs
    - hash_policy
    - notes
